{% extends 'base.html' %}

{% block content %}
<div class="container animate-fade-in" style="max-width: 500px; margin-top: 5rem;">
    <div class="glass-card">
        <h2 style="margin-bottom: 2rem; text-align: center;">Trainer Login</h2>
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter admin username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.8rem;">
            Default credentials: admin / admin123 <br><br>
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--accent);">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
